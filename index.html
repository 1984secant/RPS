  <body>
    
    <div class="header">
        <p id="message">R. P. S.</p>
    </div>
   <div class="container">
   <form class="userForm">
     <div class="input">
        
         <label class="input-label">YOUR NAME.</label>
          <input type="text" class="input-field" id="player" required/>
         <br>
        <button class="btn btn-secondary" type="button" id="submit">ENTER</button>
    </div>
   </form>
    <button class="btn btn-secondary" type="button" id="lightswitch">LIGHT SWITCH</button>
   <!-- <p id="message"></p> -->
       <br>
       <div class=" row g-3 scoresChoices">
        <div class="col-12 col-sm-6 col-lg-3">
            <p class="user" id="userSelect">YOUR CHOICE : <p id="userChoice"> </p> </p>
             <p id="userScore">-</p>
                    <img class="ricardo" src="https://static.wikitide.net/projectmoonwiki/9/91/StoryLog_Jia_Qiu.webp"> 
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
            
            <p id="results">VERDICT</p> 
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
            <p class="computer" id="compSelect">COMPUTER CHOICE : <p id="compChoice"> </p> </p>
                        <p class="computer" id="compScore">-</p>
                        <img class="ricardo" src="https://static.wikitide.net/projectmoonwiki/a/a3/StoryLog_Limbus_Ricardo.webp">
        </div>
        <!-- <p class="user" id="userSelect">YOUR CHOICE : <p id="userChoice"> </p> </p>
            <p class="computer" id="compSelect">COMPUTER CHOICE : <p id="compChoice"> </p> </p>
            <p id="userScore">-</p>
            <p class="computer" id="compScore">-</p>
            <p id="results">UNDECIDED</p> -->
       </div><br>
    <button type="button" class="btn btn-secondary" id="reset">RESTART</button>
    <br><br>
     <div class="row g-3" id="choices">
                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="card h-100">
                        <img src="https://files.catbox.moe/gf99do.png" class="card-img-top">
                        <div class="card-body">
                            <a href="#"  id="decision" class="btn btn-primary rock" value="ROCK">ROCK</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="card h-100">
                        <img src="https://files.catbox.moe/7asc8g.png" class="card-img-top">
                        <div class="card-body">
                            <a href="#"  id="decision" class="btn btn-primary paper" value="PAPER">PAPER</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-sm-6 col-lg-3">
                    <div class="card h-100">
                        <img src="https://files.catbox.moe/bm1t8v.png" class="card-img-top">
                        <div class="card-body">
                            <a href="#" id="decision" class="btn btn-primary scissors" value="SCISSORS">SCISSORS</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
      <br><br><br>
    </div>
